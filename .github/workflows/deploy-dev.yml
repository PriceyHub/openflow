name: Deploy to Dev

on:
  push:
    branches: [main]
    paths:
      - "nifi/flows/**"
      - "nifi/parameter_contexts/dev.json"
      - "deploy/**"
  workflow_dispatch:
    inputs:
      flow:
        description: "Flow to deploy (leave blank for all)"
        required: false
        default: ""

concurrency:
  group: deploy-dev
  cancel-in-progress: false

env:
  PYTHON_VERSION: "3.12"
  AWS_REGION: eu-west-2

jobs:
  validate:
    name: Validate flow JSON
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate NiFi flow JSON files
        run: |
          for f in nifi/flows/*.json nifi/parameter_contexts/*.json; do
            echo "Validating $f"
            python3 -c "import json, sys; json.load(open('$f'))" || { echo "Invalid JSON: $f"; exit 1; }
          done
          echo "All JSON files are valid"

  deploy:
    name: Deploy to Dev NiFi
    runs-on: ubuntu-latest
    needs: validate
    environment: dev
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install deploy dependencies
        run: pip install -r deploy/requirements.txt

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy flows to Dev
        env:
          NIFI_ADMIN_PASSWORD: ${{ secrets.NIFI_DEV_ADMIN_PASSWORD }}
        run: |
          FLOW_ARG=""
          if [ -n "${{ github.event.inputs.flow }}" ]; then
            FLOW_ARG="--flow ${{ github.event.inputs.flow }}"
          fi
          python deploy/deploy.py --env dev $FLOW_ARG
        working-directory: ${{ github.workspace }}

  test:
    name: Run ingestion tests against Dev
    runs-on: ubuntu-latest
    needs: deploy
    environment: dev

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install test dependencies
        run: pip install -r tests/requirements.txt

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Run basic ingestion tests
        env:
          NIFI_URL: ${{ secrets.NIFI_DEV_URL }}
          NIFI_ADMIN_PASSWORD: ${{ secrets.NIFI_DEV_ADMIN_PASSWORD }}
          SNOWFLAKE_ACCOUNT: ${{ secrets.SNOWFLAKE_ACCOUNT }}
          SNOWFLAKE_USER: ${{ secrets.SNOWFLAKE_USER }}
          SNOWFLAKE_PASSWORD: ${{ secrets.SNOWFLAKE_PASSWORD }}
          SNOWFLAKE_DATABASE: OPENFLOW_DEV
          SNOWFLAKE_WAREHOUSE: OPENFLOW_INGEST_WH_DEV
          SNOWFLAKE_SCHEMA: RAW
          PG_HOST: ${{ secrets.PG_HOST }}
          PG_PORT: "5432"
          PG_DATABASE: ${{ secrets.PG_DATABASE }}
          PG_USER: ${{ secrets.PG_USER }}
          PG_PASSWORD: ${{ secrets.PG_PASSWORD }}
          AWS_REGION: ${{ env.AWS_REGION }}
          S3_STAGING_BUCKET: ${{ secrets.S3_STAGING_BUCKET_DEV }}
          CDC_PROPAGATION_WAIT: "60"
        run: |
          pytest tests/ -v --timeout=300 -m "not slow" \
            --tb=short \
            --junitxml=test-results/dev-results.xml
        working-directory: ${{ github.workspace }}

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dev-test-results
          path: test-results/

  notify_success:
    name: Notify on success
    runs-on: ubuntu-latest
    needs: [deploy, test]
    if: success()
    steps:
      - name: Summarise
        run: |
          echo "### Dev Deploy Succeeded" >> $GITHUB_STEP_SUMMARY
          echo "- Flows deployed: all" >> $GITHUB_STEP_SUMMARY
          echo "- Tests passed" >> $GITHUB_STEP_SUMMARY
          echo "- Ready to promote: run the **Promote to Test** workflow" >> $GITHUB_STEP_SUMMARY
