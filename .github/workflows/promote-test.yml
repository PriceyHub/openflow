name: Promote to Test

on:
  workflow_dispatch:
    inputs:
      flow:
        description: "Flow to promote (leave blank for all)"
        required: false
        default: ""
      registry_version:
        description: "Registry version to promote (leave blank for latest)"
        required: false
        default: ""

concurrency:
  group: deploy-test
  cancel-in-progress: false

env:
  PYTHON_VERSION: "3.12"
  AWS_REGION: eu-west-2

jobs:
  require_approval:
    name: Gate — manual approval required
    runs-on: ubuntu-latest
    environment: test       # GitHub environment with required_reviewers configured
    steps:
      - name: Approval granted
        run: echo "Promotion to Test approved by ${{ github.actor }}"

  deploy:
    name: Deploy to Test NiFi
    runs-on: ubuntu-latest
    needs: require_approval
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install deploy dependencies
        run: pip install -r deploy/requirements.txt

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy flows to Test
        env:
          NIFI_ADMIN_PASSWORD: ${{ secrets.NIFI_TEST_ADMIN_PASSWORD }}
        run: |
          FLOW_ARG=""
          VERSION_ARG=""
          if [ -n "${{ github.event.inputs.flow }}" ]; then
            FLOW_ARG="--flow ${{ github.event.inputs.flow }}"
          fi
          if [ -n "${{ github.event.inputs.registry_version }}" ]; then
            VERSION_ARG="--version ${{ github.event.inputs.registry_version }}"
          fi
          python deploy/deploy.py --env test $FLOW_ARG $VERSION_ARG
        working-directory: ${{ github.workspace }}

  test:
    name: Run integration tests against Test
    runs-on: ubuntu-latest
    needs: deploy

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install test dependencies
        run: pip install -r tests/requirements.txt

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Run full test suite (including recovery)
        env:
          NIFI_URL: ${{ secrets.NIFI_TEST_URL }}
          NIFI_ADMIN_PASSWORD: ${{ secrets.NIFI_TEST_ADMIN_PASSWORD }}
          SNOWFLAKE_ACCOUNT: ${{ secrets.SNOWFLAKE_ACCOUNT }}
          SNOWFLAKE_USER: ${{ secrets.SNOWFLAKE_USER }}
          SNOWFLAKE_PASSWORD: ${{ secrets.SNOWFLAKE_PASSWORD }}
          SNOWFLAKE_DATABASE: OPENFLOW_TEST
          SNOWFLAKE_WAREHOUSE: OPENFLOW_INGEST_WH_TEST
          SNOWFLAKE_SCHEMA: RAW
          PG_HOST: ${{ secrets.PG_HOST }}
          PG_PORT: "5432"
          PG_DATABASE: ${{ secrets.PG_DATABASE }}
          PG_USER: ${{ secrets.PG_USER }}
          PG_PASSWORD: ${{ secrets.PG_PASSWORD }}
          AWS_REGION: ${{ env.AWS_REGION }}
          S3_STAGING_BUCKET: ${{ secrets.S3_STAGING_BUCKET_TEST }}
          CDC_PROPAGATION_WAIT: "60"
        run: |
          pytest tests/ -v --timeout=420 -m "not slow" \
            --tb=short \
            --junitxml=test-results/test-results.xml
        working-directory: ${{ github.workspace }}

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-env-test-results
          path: test-results/

  notify_success:
    name: Summarise
    runs-on: ubuntu-latest
    needs: [deploy, test]
    if: success()
    steps:
      - name: Summarise
        run: |
          echo "### Test Promotion Succeeded" >> $GITHUB_STEP_SUMMARY
          echo "- Promoted by: ${{ github.actor }}" >> $GITHUB_STEP_SUMMARY
          echo "- Tests passed on Test environment" >> $GITHUB_STEP_SUMMARY
          echo "- Ready for prod: run **Promote to Prod** workflow" >> $GITHUB_STEP_SUMMARY
