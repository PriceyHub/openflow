name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-dev
  cancel-in-progress: true

jobs:
  deploy-dev:
    name: Deploy to dev
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install Python dependencies
        run: pip install -r deploy/requirements.txt

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: eu-west-2

      - name: Install SSM session manager plugin
        run: |
          curl -fsSL \
            "https://s3.amazonaws.com/session-manager-downloads/plugin/latest/ubuntu_64bit/session-manager-plugin.deb" \
            -o /tmp/smp.deb
          sudo dpkg -i /tmp/smp.deb

      - name: Start SSM tunnels
        run: |
          aws ssm start-session \
            --target i-0aaf347379a7f6939 \
            --document-name AWS-StartPortForwardingSession \
            --parameters portNumber=8443,localPortNumber=8443 \
            --region eu-west-2 &
          echo $! > /tmp/nifi-tunnel.pid

          aws ssm start-session \
            --target i-0b34d96c1a2278245 \
            --document-name AWS-StartPortForwardingSession \
            --parameters portNumber=18080,localPortNumber=18080 \
            --region eu-west-2 &
          echo $! > /tmp/registry-tunnel.pid

          echo "Waiting for NiFi tunnel..."
          timeout 90 bash -c \
            'until curl -sk https://localhost:8443/nifi-api/system-diagnostics -o /dev/null; do sleep 3; done'

          echo "Waiting for Registry tunnel..."
          timeout 60 bash -c \
            'until curl -s http://localhost:18080/nifi-registry-api/buckets -o /dev/null; do sleep 3; done'

          # Keepalive: ping NiFi every 60s to prevent SSM idle timeout (default 20 min)
          while true; do curl -sk https://localhost:8443/nifi-api/system-diagnostics -o /dev/null 2>&1 || true; sleep 60; done &
          echo $! > /tmp/nifi-keepalive.pid

      - name: Deploy flows
        env:
          NIFI_ADMIN_PASSWORD: ${{ secrets.NIFI_ADMIN_PASSWORD }}
        run: python deploy/deploy.py --env dev

      - name: Wait for NiFi processors to start
        env:
          NIFI_ADMIN_PASSWORD: ${{ secrets.NIFI_ADMIN_PASSWORD }}
        run: |
          TOKEN=$(curl -sk -X POST https://localhost:8443/nifi-api/access/token \
            -d "username=admin&password=${NIFI_ADMIN_PASSWORD}" \
            -H "Content-Type: application/x-www-form-urlencoded")
          echo "Waiting for PostgreSQL CDC processors to reach running state..."
          deadline=$(($(date +%s) + 360))
          while [ $(date +%s) -lt $deadline ]; do
            RUNNING=$(curl -sk -H "Authorization: Bearer $TOKEN" \
              "https://localhost:8443/nifi-api/process-groups/root/process-groups" | \
              jq '[.processGroups[] | select(.component.name=="PostgreSQL CDC") | (.status.aggregateSnapshot.runningCount//0)] | add // 0')
            echo "  PostgreSQL CDC running=$RUNNING"
            [ "$RUNNING" -gt 0 ] && { echo "Ready."; break; }
            sleep 15
          done

      - name: NiFi pipeline diagnostics
        if: always()
        env:
          NIFI_ADMIN_PASSWORD: ${{ secrets.NIFI_ADMIN_PASSWORD }}
        run: |
          TOKEN=$(curl -sk -X POST https://localhost:8443/nifi-api/access/token \
            -d "username=admin&password=${NIFI_ADMIN_PASSWORD}" \
            -H "Content-Type: application/x-www-form-urlencoded") \
            || { echo "Cannot reach NiFi — skipping diagnostics"; exit 0; }
          echo "=== Process groups ==="
          curl -sk -H "Authorization: Bearer $TOKEN" "https://localhost:8443/nifi-api/process-groups/root/process-groups" | jq -r '[.processGroups[] | {name:.component.name,run:(.status.aggregateSnapshot.runningCount//0),stop:(.status.aggregateSnapshot.stoppedCount//0),inv:(.status.aggregateSnapshot.invalidCount//0)}] | unique_by(.name) | .[] | "\(.name): running=\(.run) stopped=\(.stop) invalid=\(.inv)"'
          echo "=== Root controller services ==="
          curl -sk -H "Authorization: Bearer $TOKEN" "https://localhost:8443/nifi-api/flow/controller/controller-services" | jq -r '.controllerServices[] | "\(.component.name): \(.component.state)"'
          echo "=== Bulletins ==="
          BULLS=$(curl -sk -H "Authorization: Bearer $TOKEN" "https://localhost:8443/nifi-api/flow/bulletin-board?limit=30" | jq -r '.bulletinBoard.bulletins[] | select(.bulletin.level=="ERROR" or .bulletin.level=="WARNING") | "\(.bulletin.timestamp) [\(.bulletin.level)] \(.bulletin.sourceName): \(.bulletin.message)"')
          echo "${BULLS:-No error/warning bulletins}"
          echo "=== S3 staging ==="
          aws s3 ls "s3://openflow-staging-dev-eu-west-2/" --recursive 2>&1 | head -20 || echo "Empty or no access"

      - name: Load test credentials
        run: |
          PG=$(aws secretsmanager get-secret-value --secret-id openflow/dev/postgres --region eu-west-2 --query SecretString --output text)
          SF=$(aws secretsmanager get-secret-value --secret-id openflow/dev/snowflake --region eu-west-2 --query SecretString --output text)
          echo "PG_HOST=$(echo $PG       | python3 -c "import json,sys; print(json.load(sys.stdin)['host'])")"     >> $GITHUB_ENV
          echo "PG_DATABASE=$(echo $PG  | python3 -c "import json,sys; print(json.load(sys.stdin)['database'])")" >> $GITHUB_ENV
          echo "PG_USER=$(echo $PG      | python3 -c "import json,sys; print(json.load(sys.stdin)['username'])")" >> $GITHUB_ENV
          echo "PG_PASSWORD=$(echo $PG  | python3 -c "import json,sys; print(json.load(sys.stdin)['password'])")" >> $GITHUB_ENV
          echo "SNOWFLAKE_USER=OPENFLOW_NIFI_SVC"            >> $GITHUB_ENV
          echo "SNOWFLAKE_ACCOUNT=cngfczx-ow26289"          >> $GITHUB_ENV
          echo "SNOWFLAKE_DATABASE=OPENFLOW_DEV"             >> $GITHUB_ENV
          echo "SNOWFLAKE_WAREHOUSE=OPENFLOW_INGEST_WH_DEV"  >> $GITHUB_ENV
          echo "SNOWFLAKE_SCHEMA=POSTGRES_CDC"               >> $GITHUB_ENV
          echo "NIFI_URL=https://127.0.0.1:8443"             >> $GITHUB_ENV
          echo "S3_STAGING_BUCKET=openflow-staging-dev-eu-west-2" >> $GITHUB_ENV
          echo "AWS_REGION=eu-west-2"                        >> $GITHUB_ENV

      - name: Run integration tests
        env:
          NIFI_ADMIN_PASSWORD: ${{ secrets.NIFI_ADMIN_PASSWORD }}
          SNOWFLAKE_PRIVATE_KEY: ${{ secrets.SNOWFLAKE_PRIVATE_KEY }}
          PG_PORT: "5432"
        run: |
          pip install pytest pytest-timeout psycopg2-binary snowflake-connector-python cryptography nipyapi
          cd tests && pytest -v --timeout=600 -m "not slow" 2>&1

      - name: Stop SSM tunnels
        if: always()
        run: |
          kill "$(cat /tmp/nifi-keepalive.pid)" 2>/dev/null || true
          kill "$(cat /tmp/nifi-tunnel.pid)"    2>/dev/null || true
          kill "$(cat /tmp/registry-tunnel.pid)" 2>/dev/null || true
